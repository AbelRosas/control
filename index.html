<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0F17">
<title>Mi Plan · Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0B0F17; --bg2:#0E131F; --surface:#151C2C; --surface2:#1B2335;
    --border:#232C42; --border2:#2C374F;
    --text:#E8ECF4; --muted:#8A94A8; --muted2:#626E85;
    --green:#2DD4A7; --green-d:rgba(45,212,167,.14);
    --amber:#F5A623; --amber-d:rgba(245,166,35,.14);
    --rose:#FB6F84; --rose-d:rgba(251,111,132,.14);
    --blue:#5B8DEF; --blue-d:rgba(91,141,239,.14);
    --violet:#9B8CFF; --violet-d:rgba(155,140,255,.14);
    --radius:16px; --radius-s:11px;
    --shadow:0 8px 30px rgba(0,0,0,.35);
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{background:radial-gradient(1100px 600px at 80% -10%,rgba(45,212,167,.06),transparent 60%),radial-gradient(900px 500px at -10% 0%,rgba(91,141,239,.05),transparent 55%),var(--bg);min-height:100vh;padding-bottom:40px}
  ::selection{background:rgba(45,212,167,.3)}
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  .tnum{font-variant-numeric:tabular-nums}
  .mono{font-family:var(--display)}

  /* Header */
  header{position:sticky;top:0;z-index:40;background:rgba(11,15,23,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
  .head-row{max-width:980px;margin:0 auto;padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--green),#1B9E7C);display:grid;place-items:center;font-family:var(--display);font-weight:700;color:#05130E;font-size:17px;box-shadow:0 4px 14px rgba(45,212,167,.35)}
  .brand h1{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:-.2px}
  .brand p{font-size:11.5px;color:var(--muted);margin-top:1px}
  .saved-dot{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
  .saved-dot i{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-d);display:block}

  /* Tabs */
  nav.tabs{max-width:980px;margin:0 auto;padding:4px 12px 12px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:8px 15px;border-radius:999px;font-size:13.5px;font-weight:500;color:var(--muted);background:var(--surface);border:1px solid var(--border);white-space:nowrap;transition:.18s}
  .tab:hover{color:var(--text);border-color:var(--border2)}
  .tab.active{color:#05130E;background:var(--green);border-color:var(--green);font-weight:600}

  main{max-width:980px;margin:0 auto;padding:6px 16px}
  .view{display:none;animation:fade .35s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Cards & layout */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:680px){.g2,.g3{grid-template-columns:1fr 1fr}}
  @media(max-width:430px){.g3{grid-template-columns:1fr 1fr}}
  .section-title{font-family:var(--display);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin:26px 4px 12px}
  .section-title:first-child{margin-top:14px}

  /* Hero savings */
  .hero{background:linear-gradient(160deg,#13231F 0%,#141C2C 55%,#151C2C 100%);border:1px solid var(--border2);border-radius:20px;padding:22px;position:relative;overflow:hidden}
  .hero::after{content:'';position:absolute;right:-60px;top:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(45,212,167,.18),transparent 70%);pointer-events:none}
  .hero-flex{display:flex;align-items:center;gap:22px}
  .ring-wrap{position:relative;width:128px;height:128px;flex:0 0 auto}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .ring-center .pct{font-family:var(--display);font-size:25px;font-weight:700;line-height:1}
  .ring-center .pl{font-size:10.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.8px}
  .hero-info{flex:1;min-width:0}
  .hero-info .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .hero-info .big{font-family:var(--display);font-size:34px;font-weight:700;letter-spacing:-1px;margin:3px 0;line-height:1}
  .hero-info .sub{font-size:13px;color:var(--muted)}
  .delta{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;padding:4px 9px;border-radius:8px;margin-top:9px}
  .delta.up{color:var(--green);background:var(--green-d)}
  .delta.down{color:var(--amber);background:var(--amber-d)}
  @media(max-width:520px){.hero-flex{flex-direction:column;text-align:center}.hero-info .big{font-size:30px}}

  /* Stat tiles */
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);padding:14px 15px}
  .stat .k{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
  .stat .v{font-family:var(--display);font-size:21px;font-weight:600;margin-top:7px;letter-spacing:-.4px}
  .stat .v.sm{font-size:18px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .c-green{color:var(--green)} .c-rose{color:var(--rose)} .c-amber{color:var(--amber)} .c-blue{color:var(--blue)} .c-violet{color:var(--violet)} .c-muted{color:var(--muted)}
  .bg-green{background:var(--green)} .bg-rose{background:var(--rose)} .bg-amber{background:var(--amber)} .bg-blue{background:var(--blue)} .bg-violet{background:var(--violet)}

  /* Payment / list rows */
  .row{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .check{width:25px;height:25px;border-radius:8px;border:2px solid var(--border2);flex:0 0 auto;display:grid;place-items:center;transition:.15s;background:var(--bg2)}
  .check.on{background:var(--green);border-color:var(--green)}
  .check svg{opacity:0;transition:.15s;width:14px;height:14px}
  .check.on svg{opacity:1}
  .row-main{flex:1;min-width:0}
  .row-main .t{font-size:14.5px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .row-main .t.paid{text-decoration:line-through;color:var(--muted)}
  .row-main .d{font-size:12.5px;color:var(--muted);margin-top:2px}
  .row-amt{font-family:var(--display);font-size:15px;font-weight:600;white-space:nowrap}
  .badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px;letter-spacing:.3px;text-transform:uppercase}
  .b-green{color:var(--green);background:var(--green-d)} .b-rose{color:var(--rose);background:var(--rose-d)} .b-amber{color:var(--amber);background:var(--amber-d)} .b-blue{color:var(--blue);background:var(--blue-d)} .b-violet{color:var(--violet);background:var(--violet-d)} .b-muted{color:var(--muted);background:rgba(138,148,168,.12)}
  .over{color:var(--rose)!important}
  .icon-btn{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted);border:1px solid transparent;flex:0 0 auto}
  .icon-btn:hover{color:var(--text);background:var(--surface2);border-color:var(--border)}

  /* Filter pills */
  .filters{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px;padding-bottom:2px}
  .filters::-webkit-scrollbar{display:none}
  .fp{flex:0 0 auto;padding:6px 13px;border-radius:999px;font-size:12.5px;color:var(--muted);background:var(--surface);border:1px solid var(--border)}
  .fp.active{color:var(--text);background:var(--surface2);border-color:var(--border2)}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;border-radius:11px;font-size:14px;font-weight:600;transition:.16s}
  .btn-pri{background:var(--green);color:#05130E}
  .btn-pri:hover{filter:brightness(1.07)}
  .btn-gho{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
  .btn-gho:hover{border-color:var(--green);color:var(--green)}
  .btn-block{width:100%}
  .btn-sm{padding:8px 13px;font-size:13px;border-radius:9px}
  .btn-danger{background:var(--rose-d);color:var(--rose);border:1px solid rgba(251,111,132,.3)}
  .btn-danger:hover{background:rgba(251,111,132,.2)}

  /* Debt progress */
  .debt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:13px}
  .debt-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:11px}
  .debt-head h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .prog{height:9px;border-radius:99px;background:var(--bg2);overflow:hidden;margin:11px 0 9px}
  .prog i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
  .debt-meta{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted)}
  .debt-note{font-size:12.5px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.45}

  /* Chart */
  .chart-box{position:relative;height:260px;width:100%}
  .chart-box.tall{height:290px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:12.5px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:7px}

  /* Income/week table */
  .wk{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border)}
  .wk:last-child{border-bottom:none}
  .wk-n{width:34px;height:34px;border-radius:9px;background:var(--surface2);display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:13px;flex:0 0 auto;border:1px solid var(--border)}
  .wk-n.cur{background:var(--green);color:#05130E;border-color:var(--green)}
  .wk-info{flex:1;min-width:0}
  .wk-info .wt{font-size:13.5px;font-weight:500}
  .wk-info .wd{font-size:12px;color:var(--muted);margin-top:1px}
  .wk-in{width:108px;flex:0 0 auto}
  .mini-input{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--text);text-align:right;font-family:var(--display);font-weight:600;font-size:14px;transition:.15s}
  .mini-input:focus{outline:none;border-color:var(--green)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(5,8,14,.72);backdrop-filter:blur(4px);z-index:90;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  @media(min-width:560px){.overlay{align-items:center}}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:22px;animation:slideUp .3s ease}
  @media(min-width:560px){.modal{border-radius:20px}}
  @keyframes slideUp{from{transform:translateY(28px);opacity:.6}to{transform:none;opacity:1}}
  .modal h2{font-family:var(--display);font-size:19px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;padding:12px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;color:var(--text);transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}
  .field textarea{resize:vertical;min-height:60px}
  .field-row{display:flex;gap:11px}.field-row .field{flex:1}
  .switch{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:11px}
  .switch span{font-size:13.5px}
  .toggle{width:46px;height:26px;border-radius:99px;background:var(--border2);position:relative;transition:.2s;flex:0 0 auto}
  .toggle.on{background:var(--green)}
  .toggle i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on i{left:23px}
  .modal-actions{display:flex;gap:11px;margin-top:20px}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:500;z-index:120;box-shadow:var(--shadow);opacity:0;transition:.3s;display:flex;align-items:center;gap:9px;max-width:90vw}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast .ti{width:8px;height:8px;border-radius:50%;background:var(--green);flex:0 0 auto}

  .empty{text-align:center;padding:34px 18px;color:var(--muted)}
  .empty .ei{font-size:30px;margin-bottom:10px;opacity:.5}
  .empty p{font-size:13.5px}
  .hint{font-size:12.5px;color:var(--muted);line-height:1.5;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px 14px;display:flex;gap:10px}
  .hint .hi{color:var(--blue);flex:0 0 auto;margin-top:1px}
  .add-bar{display:flex;gap:11px;margin:14px 0 4px}
  .foot{text-align:center;color:var(--muted2);font-size:11.5px;margin:34px 0 10px;line-height:1.6}
  .right{margin-left:auto}
</style>
</head>
<body>
<header>
  <div class="head-row">
    <div class="brand">
      <div class="logo">$</div>
      <div><h1 id="appName">Mi Plan</h1><p>Vacaciones · jun – ago 2026</p></div>
    </div>
    <div class="saved-dot"><i></i><span id="savedTxt">Guardado</span></div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-v="inicio">Inicio</button>
    <button class="tab" data-v="pagos">Pagos</button>
    <button class="tab" data-v="deudas">Deudas</button>
    <button class="tab" data-v="ingresos">Ingresos</button>
    <button class="tab" data-v="gastos">Gastos</button>
    <button class="tab" data-v="graficas">Gráficas</button>
    <button class="tab" data-v="ajustes">Ajustes</button>
  </nav>
</header>

<main>
  <section class="view active" id="v-inicio"></section>
  <section class="view" id="v-pagos"></section>
  <section class="view" id="v-deudas"></section>
  <section class="view" id="v-ingresos"></section>
  <section class="view" id="v-gastos"></section>
  <section class="view" id="v-graficas"></section>
  <section class="view" id="v-ajustes"></section>
  <div class="foot">Tus datos se guardan solo en este dispositivo.<br>Haz un respaldo en Ajustes de vez en cuando.</div>
</main>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"><span class="ti"></span><span id="toastMsg"></span></div>

<script>
"use strict";
/* ============ Utilidades ============ */
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MESF=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIA=['dom','lun','mar','mié','jue','vie','sáb'];
const money=n=>new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const money0=n=>new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(n||0);
const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const iso=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
const fDate=s=>{const d=pd(s);return `${d.getDate()} ${MES[d.getMonth()]}`;};
const fDateL=s=>{const d=pd(s);return `${DIA[d.getDay()]} ${d.getDate()} ${MES[d.getMonth()]}`;};
const today=()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());};
const uid=()=>'i'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);
const daysBetween=(a,b)=>Math.round((b-a)/864e5);

/* ============ Datos iniciales ============ */
const MONDAYS=['2026-06-15','2026-06-22','2026-06-29','2026-07-06','2026-07-13','2026-07-20','2026-07-27','2026-08-03','2026-08-10','2026-08-17','2026-08-24','2026-08-31'];
function defaultState(){
  const mv=[];
  const cash=[['2026-06-16',60.45],['2026-06-19',157.67],['2026-06-20',150.50],['2026-06-25',590.20],['2026-06-25',258.00],['2026-07-01',60.45],['2026-07-04',157.67],['2026-07-05',150.50],['2026-07-10',590.20],['2026-07-10',258.00],['2026-07-16',60.45],['2026-07-19',157.67],['2026-07-20',150.50],['2026-07-25',590.20],['2026-07-25',258.00],['2026-07-31',60.45],['2026-08-03',157.67],['2026-08-04',150.50],['2026-08-09',258.00],['2026-08-15',60.45],['2026-08-18',157.67],['2026-08-19',150.50],['2026-08-24',258.00],['2026-08-30',60.45],['2026-09-02',157.67],['2026-09-03',150.50],['2026-09-08',258.00],['2026-09-14',60.45],['2026-09-17',157.67],['2026-09-23',258.00],['2026-09-29',60.45],['2026-10-02',157.67],['2026-10-08',258.00],['2026-10-17',157.67],['2026-10-23',258.00],['2026-11-01',157.67],['2026-11-07',258.00],['2026-11-16',157.67],['2026-11-22',258.00],['2026-12-01',157.63],['2026-12-07',258.00]];
  cash.forEach(([f,m])=>mv.push({id:uid(),tipo:'deuda',debtId:'ef',categoria:'Efectivo',monto:m,fecha:f,pagado:false,fechaPagado:null,montoPagado:null,nota:'',adel:'opcional'}));
  ['2026-07-05','2026-08-05','2026-09-05','2026-10-05','2026-11-05','2026-12-05'].forEach(f=>mv.push({id:uid(),tipo:'deuda',debtId:'t1',categoria:'Tarjeta 1',monto:154.13,fecha:f,pagado:false,fechaPagado:null,montoPagado:null,nota:'Pago fijo del día 5 (MSI)',adel:'no'}));
  mv.push({id:uid(),tipo:'deuda',debtId:'t2',categoria:'Tarjeta 2',monto:1700,fecha:'2026-06-29',pagado:false,fechaPagado:null,montoPagado:null,nota:'Abono anticipado 1 de 2',adel:'recomendado'});
  mv.push({id:uid(),tipo:'deuda',debtId:'t2',categoria:'Tarjeta 2',monto:1501.83,fecha:'2026-07-06',pagado:false,fechaPagado:null,montoPagado:null,nota:'Liquidación total — antes del día 9',adel:'recomendado'});
  MONDAYS.forEach(f=>mv.push({id:uid(),tipo:'gasto',recur:true,categoria:'Comida',monto:200,fecha:f,pagado:false,fechaPagado:null,montoPagado:null,nota:''}));

const KEY='plan-finanzas-v1';
let state, memOnly=false;
function load(){
  try{const r=localStorage.getItem(KEY);if(r){state=JSON.parse(r);migrate();return;}}catch(e){memOnly=true;}
  state=defaultState();save();
}
function migrate(){ if(!state.config)state.config=defaultState().config; if(!state.movimientos)state.movimientos=[]; if(!state.ingresos)state.ingresos=[]; if(!state.deudas)state.deudas=[]; }
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state));flashSaved();}
  catch(e){memOnly=true;$('#savedTxt').textContent='Solo esta sesión';}
}
let savedTimer;
function flashSaved(){const t=$('#savedTxt');t.textContent='Guardando…';clearTimeout(savedTimer);savedTimer=setTimeout(()=>t.textContent='Guardado',500);}

/* ============ Cálculos ============ */
const weekRange=i=>{const s=pd(MONDAYS[i]);const e=new Date(s);e.setDate(e.getDate()+6);return[s,e];};
function weekOf(fechaStr){const d=pd(fechaStr);for(let i=0;i<MONDAYS.length;i++){const[s,e]=weekRange(i);if(d>=s&&d<=e)return i;}return -1;}
function calc(){
  const c={};
  c.ingresoTotal=state.ingresos.reduce((a,x)=>a+(x.esperado||0),0);
  // egresos planeados dentro de las 12 semanas
  const enRango=state.movimientos.filter(m=>weekOf(m.fecha)>=0);
  c.egresoPlan=enRango.reduce((a,m)=>a+m.monto,0);
  c.ahorroProyectado=c.ingresoTotal-c.egresoPlan;
  // deuda
  c.deudaTotal=state.deudas.reduce((a,d)=>a+d.saldoInicial,0);
  c.deudaPagada=state.movimientos.filter(m=>m.tipo==='deuda'&&m.pagado).reduce((a,m)=>a+(m.montoPagado||m.monto),0);
  c.deudaRestante=c.deudaTotal-c.deudaPagada;
  // curvas semanales
  c.plan=[];c.real=[];let cp=0,cr=0;
  const tod=today();
  c.semActual=0;
  MONDAYS.forEach((mon,i)=>{
    const[s,e]=weekRange(i);
    if(tod>=s)c.semActual=i+1;
    const ing=state.ingresos[i]||{esperado:0,real:null};
    const movs=state.movimientos.filter(m=>weekOf(m.fecha)===i);
    const planEg=movs.reduce((a,m)=>a+m.monto,0);
    cp+=(ing.esperado||0)-planEg;
    c.plan.push(Math.round(cp*100)/100);
    // real
    const realEg=movs.filter(m=>m.pagado||(m.tipo==='gasto'&&m.recur===false)).reduce((a,m)=>a+(m.montoPagado||m.monto),0);
    const realIn=(ing.real!=null)?ing.real:0;
    cr+=realIn-realEg;
    c.real.push(tod>=s?Math.round(cr*100)/100:null);
  });
  // ahorro real "hoy"
  let idx=c.semActual>0?c.semActual-1:0;
  c.ahorroReal=c.real[idx]!=null?c.real[idx]:0;
  c.proyectadoHoy=c.plan[idx]||0;
  c.delta=c.ahorroReal-c.proyectadoHoy;
  // gastos extra total
  c.extras=state.movimientos.filter(m=>m.tipo==='gasto'&&m.recur===false);
  return c;
}
function proximos(n=6){
  const tod=today();
  return state.movimientos.filter(m=>m.tipo==='deuda'&&!m.pagado)
    .sort((a,b)=>pd(a.fecha)-pd(b.fecha))
    .filter(m=>{const dd=daysBetween(tod,pd(m.fecha));return dd>=-60;})
    .slice(0,n);
}

        <div><div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">Pagado</div><div class="mono tnum c-green" style="font-size:24px;font-weight:600">${money0(c.deudaPagada)}</div></div>
        <div><div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">Restante</div><div class="mono tnum c-rose" style="font-size:24px;font-weight:600">${money0(c.deudaRestante)}</div></div>
        <div><div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">Pagos al corriente</div><div class="mono tnum" style="font-size:24px;font-weight:600">${cumplido}%</div></div>
      </div>
    </div>

    <div class="section-title">¿En qué se va el dinero?</div>
    <div class="card"><div class="chart-box" style="height:250px"><canvas id="cCat"></canvas></div></div>

    <div class="section-title">Ingresos por semana</div>
    <div class="card"><div class="chart-box"><canvas id="cInc"></canvas></div>
    <div class="legend"><span><span class="dot" style="background:var(--muted2)"></span>Esperado</span><span><span class="dot bg-green"></span>Recibido</span></div></div>`;
  $('#v-graficas').innerHTML=h;
  drawSavings('cSav',c,false);
  drawDoughnut('cDoughnut',c);
  drawCat('cCat');
  drawInc('cInc');
}

/* ============ Gráficas (Chart.js) ============ */
let charts={};
const GRID='rgba(255,255,255,.05)',TICK='#8A94A8';
function dz(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function drawSavings(id,c,mini){
  const el=$('#'+id);if(!el)return;dz(id);
  const labels=MONDAYS.map((m,i)=>'S'+(i+1));
  charts[id]=new Chart(el,{type:'line',data:{labels,datasets:[
    {label:'Proyectado',data:c.plan,borderColor:'#626E85',borderWidth:2,borderDash:[5,5],pointRadius:0,tension:.35,fill:false},
    {label:'Real',data:c.real,borderColor:'#2DD4A7',borderWidth:3,pointRadius:mini?0:3,pointBackgroundColor:'#2DD4A7',tension:.35,spanGaps:false,
     fill:true,backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,260);g.addColorStop(0,'rgba(45,212,167,.28)');g.addColorStop(1,'rgba(45,212,167,0)');return g;}}
  ]},options:baseOpts(mini,true)});
}
function drawDoughnut(id,c){
  const el=$('#'+id);if(!el)return;dz(id);
  charts[id]=new Chart(el,{type:'doughnut',data:{labels:['Pagado','Restante'],datasets:[{data:[c.deudaPagada,c.deudaRestante],backgroundColor:['#2DD4A7','#283143'],borderWidth:0,hoverOffset:4}]},
    options:{cutout:'72%',plugins:{legend:{display:false},tooltip:tt()},responsive:true,maintainAspectRatio:false}});
}
function drawCat(id){
  const el=$('#'+id);if(!el)return;dz(id);
  const map={};state.movimientos.forEach(m=>{map[m.categoria]=(map[m.categoria]||0)+m.monto;});
  const order=['Efectivo','Tarjeta 1','Tarjeta 2','Comida','Higiene','Internet','Recargas'];
  const labels=[],data=[],cols=[];
  const palette={Efectivo:'#2DD4A7','Tarjeta 1':'#5B8DEF','Tarjeta 2':'#F5A623',Comida:'#34D399',Higiene:'#9B8CFF',Internet:'#60A5FA',Recargas:'#FBBF24'};
  Object.keys(map).forEach(k=>{if(!order.includes(k))order.push(k);});
  order.forEach(k=>{if(map[k]){labels.push(k);data.push(Math.round(map[k]*100)/100);cols.push(palette[k]||'#FB6F84');}});
  charts[id]=new Chart(el,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:cols,borderWidth:0,hoverOffset:5}]},
    options:{cutout:'58%',plugins:{legend:{position:'right',labels:{color:TICK,font:{family:'Inter',size:11.5},boxWidth:9,boxHeight:9,padding:9,usePointStyle:true}},tooltip:tt()},responsive:true,maintainAspectRatio:false}});
}
function drawInc(id){
  const el=$('#'+id);if(!el)return;dz(id);
  charts[id]=new Chart(el,{type:'bar',data:{labels:MONDAYS.map((m,i)=>'S'+(i+1)),datasets:[
    {label:'Esperado',data:state.ingresos.map(x=>x.esperado),backgroundColor:'#2A3344',borderRadius:5,barPercentage:.9,categoryPercentage:.7},
    {label:'Recibido',data:state.ingresos.map(x=>x.real),backgroundColor:'#2DD4A7',borderRadius:5,barPercentage:.9,categoryPercentage:.7}
  ]},options:baseOpts(false,false)});
}
function baseOpts(mini,money_){return{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
  plugins:{legend:{display:false},tooltip:tt(money_)},
  scales:{x:{grid:{display:false},ticks:{color:TICK,font:{family:'Inter',size:mini?10:11}},border:{display:false}},
    y:{grid:{color:GRID},ticks:{color:TICK,font:{family:'Inter',size:10},callback:v=>'$'+(v>=1000?(v/1000).toFixed(0)+'k':v)},border:{display:false}}}};}
function tt(money_){return{backgroundColor:'#1B2335',borderColor:'#2C374F',borderWidth:1,titleColor:'#E8ECF4',bodyColor:'#E8ECF4',padding:11,cornerRadius:9,titleFont:{family:'Space Grotesk',size:12.5},bodyFont:{family:'Inter',size:12.5},displayColors:true,callbacks:{label:ctx=>{const v=ctx.parsed.y!=null?ctx.parsed.y:ctx.parsed;return ` ${ctx.dataset.label?ctx.dataset.label+': ':''}${money(v)}`;}}};}

/* ============ Render: Ajustes ============ */
function vAjustes(){
  const cf=state.config;
  let h=`<div class="section-title">Tu plan</div>
  <div class="card">
    <div class="field"><label>Nombre del plan</label><input id="setName" value="${cf.nombre}"></div>
    <div class="field-row">
      <div class="field"><label>Sueldo por día</label><input id="setWage" type="number" inputmode="decimal" value="${cf.sueldoDiario}"></div>
      <div class="field"><label>Días por semana</label><input id="setDays" type="number" value="${cf.diasSemana}"></div>
    </div>
    <div class="field"><label>Meta de ahorro del periodo (déjalo vacío para usar la proyección automática)</label><input id="setMeta" type="number" inputmode="decimal" placeholder="${Math.round(calc().ahorroProyectado)}" value="${cf.metaAhorro||''}"></div>
    <button class="btn btn-pri btn-block" id="saveConfig">Guardar cambios</button>
  </div>

  <div class="section-title">Respaldo de datos</div>
  <div class="hint"><span class="hi">${I.info}</span><div>Tus datos viven solo en este dispositivo. Exporta un respaldo para no perderlos y para pasarlos a otro celular o a tu compu: ahí mismo lo importas.</div></div>
  <div class="grid g2" style="margin-top:12px">
    <button class="btn btn-gho" id="btnExport">${I.down} Exportar respaldo</button>
    <button class="btn btn-gho" id="btnImport">${I.up} Importar respaldo</button>
  </div>
  <input type="file" id="fileImport" accept="application/json" style="display:none">

  <div class="section-title">Zona de riesgo</div>
  <div class="card">
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Esto borra todo lo que registraste y vuelve a dejar la app con tus datos originales del plan.</p>
    <button class="btn btn-danger btn-block" id="btnReset">Restablecer todo</button>
  </div>`;
  $('#v-ajustes').innerHTML=h;
}

/* ============ Modales ============ */
function openModal(html){$('#modal').innerHTML=html;$('#overlay').classList.add('show');document.body.style.overflow='hidden';}
function closeModal(){$('#overlay').classList.remove('show');document.body.style.overflow='';}
$('#overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

function modalPago(m){
  const isNew=!m;
  m=m||{categoria:'Efectivo',monto:'',fecha:iso(today()),nota:'',adel:'opcional',debtId:'ef',tipo:'deuda'};
  openModal(`<h2>${isNew?'Agregar pago':'Editar pago'}<button class="icon-btn" onclick="closeModal()">✕</button></h2>
    <div class="field"><label>Concepto</label><select id="mCat">
      <option ${m.categoria==='Efectivo'?'selected':''}>Efectivo</option>
      <option ${m.categoria==='Tarjeta 1'?'selected':''}>Tarjeta 1</option>
      <option ${m.categoria==='Tarjeta 2'?'selected':''}>Tarjeta 2</option>
      ${!['Efectivo','Tarjeta 1','Tarjeta 2'].includes(m.categoria)?`<option selected>${m.categoria}</option>`:''}
    </select></div>
    <div class="field-row">
      <div class="field"><label>Monto</label><input id="mMonto" type="number" inputmode="decimal" value="${m.monto}"></div>
      <div class="field"><label>Fecha</label><input id="mFecha" type="date" value="${m.fecha}"></div>
    </div>
    <div class="field"><label>¿Conviene adelantarlo?</label><select id="mAdel">
      <option value="opcional" ${m.adel==='opcional'?'selected':''}>Opcional (sin beneficio)</option>
      <option value="recomendado" ${m.adel==='recomendado'?'selected':''}>Recomendado</option>
      <option value="no" ${m.adel==='no'?'selected':''}>No adelantar</option>
    </select></div>
    <div class="field"><label>Nota (opcional)</label><input id="mNota" value="${m.nota||''}"></div>
    <div class="modal-actions">
      ${!isNew?`<button class="btn btn-danger btn-sm" id="mDel">${I.trash} Eliminar</button>`:''}
      <button class="btn btn-pri ${isNew?'btn-block':'right'}" id="mSave">Guardar</button>
    </div>`);
  $('#mSave').onclick=()=>{
    const cat=$('#mCat').value;
    const did=cat==='Efectivo'?'ef':cat==='Tarjeta 1'?'t1':cat==='Tarjeta 2'?'t2':null;
    const data={categoria:cat,monto:parseFloat($('#mMonto').value)||0,fecha:$('#mFecha').value,adel:$('#mAdel').value,nota:$('#mNota').value,debtId:did,tipo:'deuda'};
    if(isNew){state.movimientos.push({id:uid(),pagado:false,fechaPagado:null,montoPagado:null,...data});toast('Pago agregado');}
    else{Object.assign(state.movimientos.find(x=>x.id===m.id),data);toast('Pago actualizado');}
    save();closeModal();rerender();
  };
  if(!isNew)$('#mDel').onclick=()=>{state.movimientos=state.movimientos.filter(x=>x.id!==m.id);save();closeModal();rerender();toast('Pago eliminado');};
}

function modalDebt(d){
  const isNew=!d;
  d=d||{nombre:'',tipo:'tarjeta',saldoInicial:'',interes:false,color:'violet',nota:''};
  openModal(`<h2>${isNew?'Agregar deuda':'Editar deuda'}<button class="icon-btn" onclick="closeModal()">✕</button></h2>
    <div class="field"><label>Nombre</label><input id="dNombre" value="${d.nombre}"></div>
    <div class="field-row">
      <div class="field"><label>Saldo inicial</label><input id="dSaldo" type="number" inputmode="decimal" value="${d.saldoInicial}"></div>
      <div class="field"><label>Color</label><select id="dColor">
        ${['green','blue','amber','rose','violet'].map(co=>`<option value="${co}" ${d.color===co?'selected':''}>${({green:'Verde',blue:'Azul',amber:'Ámbar',rose:'Rosa',violet:'Violeta'})[co]}</option>`).join('')}
      </select></div>
    </div>
    <div class="switch" style="margin-bottom:14px"><span>¿Genera intereses?</span><div class="toggle ${d.interes?'on':''}" id="dInt"><i></i></div></div>
    <div class="field"><label>Nota / estrategia (opcional)</label><textarea id="dNota">${d.nota||''}</textarea></div>
    <div class="modal-actions"><button class="btn btn-pri btn-block" id="dSave">Guardar</button></div>`);
  $('#dInt').onclick=()=>$('#dInt').classList.toggle('on');
  $('#dSave').onclick=()=>{
    const data={nombre:$('#dNombre').value||'Deuda',saldoInicial:parseFloat($('#dSaldo').value)||0,color:$('#dColor').value,interes:$('#dInt').classList.contains('on'),nota:$('#dNota').value,tipo:'tarjeta'};
    if(isNew){state.deudas.push({id:uid(),...data});toast('Deuda agregada');}
    else{Object.assign(state.deudas.find(x=>x.id===d.id),data);toast('Deuda actualizada');}
    save();closeModal();rerender();
  };
}

function modalCat(cat){
  const items=state.movimientos.filter(m=>m.tipo==='gasto'&&m.recur&&m.categoria===cat);
  const monto=items[0]?items[0].monto:0;
  openModal(`<h2>Editar ${cat}<button class="icon-btn" onclick="closeModal()">✕</button></h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Cambia el monto y se aplica a las ${items.length} veces que aparece en el periodo.</p>
    <div class="field"><label>Monto ${cat==='Comida'?'por semana':'por mes'}</label><input id="cMonto" type="number" inputmode="decimal" value="${monto}"></div>
    <div class="modal-actions"><button class="btn btn-pri btn-block" id="cSave">Guardar</button></div>`);
  $('#cSave').onclick=()=>{const v=parseFloat($('#cMonto').value)||0;items.forEach(m=>m.monto=v);save();closeModal();rerender();toast(cat+' actualizado');};
}

function modalExtra(m){
  const isNew=!m;
  m=m||{categoria:'',monto:'',fecha:iso(today()),nota:''};
  openModal(`<h2>${isNew?'Anotar gasto extra':'Editar gasto'}<button class="icon-btn" onclick="closeModal()">✕</button></h2>
    <div class="field"><label>¿En qué fue?</label><input id="eCat" placeholder="Ej. transporte, medicina, salida" value="${m.categoria||''}"></div>
    <div class="field-row">
      <div class="field"><label>Monto</label><input id="eMonto" type="number" inputmode="decimal" value="${m.monto}"></div>
      <div class="field"><label>Fecha</label><input id="eFecha" type="date" value="${m.fecha}"></div>
    </div>
    <div class="field"><label>Nota (opcional)</label><input id="eNota" value="${m.nota||''}"></div>
    <div class="modal-actions">
      ${!isNew?`<button class="btn btn-danger btn-sm" id="eDel">${I.trash}</button>`:''}
      <button class="btn btn-pri ${isNew?'btn-block':'right'}" id="eSave">Guardar</button>
    </div>`);
  $('#eSave').onclick=()=>{
    const data={categoria:$('#eCat').value||'Gasto extra',monto:parseFloat($('#eMonto').value)||0,fecha:$('#eFecha').value,nota:$('#eNota').value,tipo:'gasto',recur:false};
    if(isNew){state.movimientos.push({id:uid(),pagado:true,fechaPagado:$('#eFecha').value,montoPagado:null,...data});toast('Gasto anotado');}
    else{Object.assign(state.movimientos.find(x=>x.id===m.id),data);toast('Gasto actualizado');}
    save();closeModal();rerender();
  };
  if(!isNew)$('#eDel').onclick=()=>{state.movimientos=state.movimientos.filter(x=>x.id!==m.id);save();closeModal();rerender();toast('Gasto eliminado');};
}

/* ============ Toast ============ */
let toastT;
function toast(msg){const t=$('#toast');$('#toastMsg').textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ============ Eventos globales ============ */
let current='inicio';
function switchView(v){
  current=v;
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  $$('.view').forEach(s=>s.classList.remove('active'));
  $('#v-'+v).classList.add('active');
  rerender();
  window.scrollTo({top:0,behavior:'smooth'});
}
function rerender(){
  ({inicio:vInicio,pagos:vPagos,deudas:vDeudas,ingresos:vIngresos,gastos:vGastos,graficas:vGraficas,ajustes:vAjustes})[current]();
}
$('#tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(t)switchView(t.dataset.v);});

document.body.addEventListener('click',e=>{
  const t=e.target;
  const pay=t.closest('[data-pay]');
  if(pay){const m=state.movimientos.find(x=>x.id===pay.dataset.pay);if(m){m.pagado=!m.pagado;m.fechaPagado=m.pagado?iso(today()):null;save();rerender();toast(m.pagado?'¡Pago marcado! 💪':'Pago desmarcado');}return;}
  const ep=t.closest('[data-edit-pay]');if(ep){modalPago(state.movimientos.find(x=>x.id===ep.dataset.editPay));return;}
  const ed=t.closest('[data-edit-debt]');if(ed){modalDebt(state.deudas.find(x=>x.id===ed.dataset.editDebt));return;}
  const dd=t.closest('[data-del-debt]');if(dd){if(confirm('¿Eliminar esta deuda y sus pagos?')){state.deudas=state.deudas.filter(x=>x.id!==dd.dataset.delDebt);state.movimientos=state.movimientos.filter(x=>x.debtId!==dd.dataset.delDebt);save();rerender();toast('Deuda eliminada');}return;}
  const ec=t.closest('[data-edit-cat]');if(ec){modalCat(ec.dataset.editCat);return;}
  const ee=t.closest('[data-edit-extra]');if(ee){modalExtra(state.movimientos.find(x=>x.id===ee.dataset.editExtra));return;}
  const de=t.closest('[data-del-extra]');if(de){state.movimientos=state.movimientos.filter(x=>x.id!==de.dataset.delExtra);save();rerender();toast('Gasto eliminado');return;}
  const f=t.closest('[data-f]');if(f){payFilter=f.dataset.f;vPagos();return;}
  if(t.closest('#addPay')){modalPago();return;}
  if(t.closest('#addDebt')){modalDebt();return;}
  if(t.closest('#addExtra')){modalExtra();return;}
  if(t.closest('#saveConfig')){
    state.config.nombre=$('#setName').value||'Mi Plan';
    state.config.sueldoDiario=parseFloat($('#setWage').value)||0;
    state.config.diasSemana=parseInt($('#setDays').value)||0;
    const mt=$('#setMeta').value;state.config.metaAhorro=mt?parseFloat(mt):null;
    $('#appName').textContent=state.config.nombre;
    save();rerender();toast('Cambios guardados');return;
  }
  if(t.closest('#btnExport')){exportData();return;}
  if(t.closest('#btnImport')){$('#fileImport').click();return;}
  if(t.closest('#btnReset')){if(confirm('¿Seguro? Esto borra todo tu progreso y restaura el plan original.')){state=defaultState();save();$('#appName').textContent=state.config.nombre;rerender();toast('Plan restablecido');}return;}
});

document.body.addEventListener('change',e=>{
  const inc=e.target.closest('[data-inc]');
  if(inc){const i=+inc.dataset.inc;const v=inc.value;state.ingresos[i].real=v===''?null:parseFloat(v)||0;save();toast('Ingreso guardado');}
});

/* ============ Respaldo ============ */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`respaldo-finanzas-${iso(today())}.json`;a.click();URL.revokeObjectURL(url);
  toast('Respaldo descargado');
}
$('#fileImport').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.movimientos||!d.ingresos)throw 0;if(confirm('Esto reemplaza tus datos actuales con los del respaldo. ¿Continuar?')){state=d;migrate();save();$('#appName').textContent=state.config.nombre;rerender();toast('Respaldo importado');}}catch(err){toast('Archivo no válido');}e.target.value='';};
  r.readAsText(file);
});

/* ============ Init ============ */
load();
$('#appName').textContent=state.config.nombre;
if(memOnly)$('#savedTxt').textContent='Solo esta sesión';
vInicio();
</script>
</body>
</html>
